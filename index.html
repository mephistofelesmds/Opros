    ];

    let currentQuestion = 0;
    const scores = [0,0,0,0,0,0,0,0];
    const quizSection = document.getElementById('quizSection');
    const resultSection = document.getElementById('resultSection');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const counter = document.getElementById('counter');
    const resultTitle = document.getElementById('resultTitle');
    const resultDesc = document.getElementById('resultDesc');
    const restartBtn = document.getElementById('restartButton');

    function renderQuestion(index) {
      if (index >= questions.length) { showResult(); return; }
      const q = questions[index];
      questionText.textContent = q.text;
      counter.textContent = `вопрос ${index+1}/${questions.length}`;
      optionsContainer.innerHTML = '';
      q.options.forEach((opt, optIndex) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.addEventListener('click', () => { handleAnswer(index, optIndex); });
        optionsContainer.appendChild(btn);
      });
    }

    function handleAnswer(qIdx, oIdx) {
      const w = answerWeights[qIdx][oIdx];
      for (let i=0;i<scores.length;i++) scores[i]+=w[i];
      currentQuestion++;
      renderQuestion(currentQuestion);
    }

    function showResult() {
      let mi=0, ms=scores[0];
      for (let i=1;i<scores.length;i++) { if(scores[i]>ms){ ms=scores[i]; mi=i; } }
      const p = personalities[mi];
      resultTitle.textContent = p.title;
      resultDesc.textContent = p.desc;
      quizSection.classList.add('hidden');
      resultSection.classList.remove('hidden');
      resultSection.classList.add('active-flex');
    }

    function restartQuiz() {
      currentQuestion=0;
      for (let i=0;i<scores.length;i++) scores[i]=0;
      resultSection.classList.add('hidden');
      resultSection.classList.remove('active-flex');
      quizSection.classList.remove('hidden');
      renderQuestion(0);
    }

    restartBtn.addEventListener('click', restartQuiz);
    renderQuestion(0);
  })();
</script>
